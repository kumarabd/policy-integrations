apiVersion: v1
kind: Secret
metadata:
  name: pep-webhook-tls
  namespace: default
type: Opaque
data:
  # Base64 encoded TLS certificate
  # Replace with actual certificate: kubectl create secret tls pep-webhook-tls --cert=webhook-cert.pem --key=webhook-key.pem --dry-run=client -o yaml
  tls.crt: ""  # Replace with base64 encoded certificate
  tls.key: ""  # Replace with base64 encoded private key
  ca.crt: ""   # Replace with base64 encoded CA certificate (for client cert verification)
---
apiVersion: v1
kind: Secret
metadata:
  name: pep-webhook-secrets
  namespace: default
type: Opaque
stringData:
  # Debug token for explain mode
  debug-token: "change-me-to-secure-random-token"


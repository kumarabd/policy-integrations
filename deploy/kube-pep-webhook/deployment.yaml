apiVersion: apps/v1
kind: Deployment
metadata:
  name: pep-webhook
  namespace: default
  labels:
    app: pep-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pep-webhook
  template:
    metadata:
      labels:
        app: pep-webhook
    spec:
      containers:
      - name: webhook
        image: policy-machine/pep-webhook:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":8443"
        - name: PDP_BASE_URL
          value: "http://policy-engine:8500"
        - name: PDP_EVALUATE_PATH
          value: "/api/v1/evaluate"
        - name: CLUSTER_ID
          value: "prod-cluster"
        - name: TLS_CERT_FILE
          value: "/etc/tls/tls.crt"
        - name: TLS_KEY_FILE
          value: "/etc/tls/tls.key"
        - name: TLS_CLIENT_CA_FILE
          value: "/etc/tls/ca.crt"
        - name: TENANT_ID
          value: "tenant-123"
        - name: FAIL_MODE
          value: "fail_closed"
        - name: SUBJECT_ID_MODE
          value: "username"
        - name: ACTION_MODE
          value: "simple"
        - name: SDK_CACHE_MAX_ENTRIES
          value: "50000"
        - name: SDK_CACHE_TTL
          value: "10s"
        - name: VERSION_REFRESH_INTERVAL
          value: "2s"
        - name: PDP_TIMEOUT
          value: "100ms"
        - name: REQUEST_TIMEOUT
          value: "200ms"
        - name: EXPLAIN_ENABLED
          value: "true"
        - name: DEBUG_TOKEN
          valueFrom:
            secretKeyRef:
              name: pep-webhook-secrets
              key: debug-token
        - name: DEBUG_CLIENT_CNS
          value: "kube-apiserver,pep-admin"
        - name: MAX_REQUEST_SIZE
          value: "1048576"  # 1MB
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: tls
        secret:
          secretName: pep-webhook-tls

